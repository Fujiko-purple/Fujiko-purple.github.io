<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fujiko - 极简日系</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC','Georgia','SimSun',serif;background:#fafaf8;color:#3a3a3a;min-height:100vh;display:flex;flex-direction:column;align-items:center;position:relative;overflow-x:hidden}

.particle{position:fixed;pointer-events:none;border-radius:50%;z-index:0;opacity:0}
@keyframes floatPetals{
  0%{transform:translateY(0)rotate(0deg)scale(0);opacity:0}
  10%{opacity:0.6}
  80%{opacity:0.3}
  100%{transform:translateY(calc(var(--d)*-1))rotate(var(--r))scale(1);opacity:0}
}

.container{position:relative;z-index:1;max-width:600px;width:100%;padding:80px 24px 60px}
.header{text-align:center;margin-bottom:60px}
.header .avatar{width:120px;height:120px;border-radius:50%;overflow:hidden;margin:0 auto 20px;transition:transform 0.3s ease;cursor:pointer}
.header .avatar:hover{transform:scale(1.12)}
.header .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.header h1{font-size:2rem;font-weight:400;letter-spacing:8px;margin-bottom:8px;color:#2a2a2a}
.header .subtitle{font-size:0.82rem;color:#aaa;letter-spacing:4px}

.nav-links{display:flex;flex-direction:column;margin-bottom:60px}
.nav-links a{display:flex;align-items:center;justify-content:space-between;padding:18px 16px;text-decoration:none;color:#555;font-size:0.95rem;border-bottom:1px solid #eee;transition:all 0.2s ease}
.nav-links a:first-child{border-top:1px solid #eee}
.nav-links a:hover{padding-left:20px}
.nav-links .arrow{color:#ccc;font-size:0.75rem;transition:transform 0.2s}
.nav-links a:hover .arrow{color:#ec4899;transform:translateX(3px)}
.nav-links .desc{font-size:0.75rem;color:#ccc;margin-left:auto;margin-right:12px}

.divider{text-align:center;margin:0 0 40px;color:#ddd;font-size:0.8rem;letter-spacing:4px}
.footer{text-align:center;padding:24px;color:#ccc;font-size:0.75rem;letter-spacing:2px}
</style>
</head>
<body>
<div id="particles"></div>

<div class="container">
  <header class="header">
    <div class="avatar"><img src="avatar.jpeg" alt="Fujiko"></div>
    <h1>Fujiko</h1>
    <p class="subtitle">学び · 創る · 遊ぶ</p>
  </header>

  <nav class="nav-links">
    <a href="dist/notes/index.html"><span>📖 学习笔记</span><span class="desc">Python · 数据库 · Linux</span><span class="arrow">→</span></a>
    <a href="dist/novels/index.html"><span>✍️ 小说创作</span><span class="desc">故事正在生长</span><span class="arrow">→</span></a>
    <a href="dist/airp/index.html"><span>🎭 AIRP 体验</span><span class="desc">角色扮演心得</span><span class="arrow">→</span></a>
    <a style="color:#ddd;cursor:default"><span>🔮 更多分区</span><span class="desc">coming soon</span><span class="arrow">—</span></a>
  </nav>

  <div class="divider">* * *</div>
  <footer class="footer"><p>© 2026 Fujiko · 用 ❤️ 和 Markdown 维护</p></footer>
</div>

<script>
(function(){
  var c = document.getElementById('particles');
  if (!c) return;
  var colors = ['#f9a8d4','#fce7f3','#fbcfe8','#e9d5ff','#fef3c7','#fde68a','#fff'];
  for (var i = 0; i < 25; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var size = 3 + Math.random() * 5;
    var dur = 10 + Math.random() * 10;
    var x = Math.random() * 100;
    var y = 10 + Math.random() * 80;
    var d = 100 + Math.random() * 150;
    var r = (Math.random() - 0.5) * 360;
    var col = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = size + 'px';
    p.style.height = size * (0.6 + Math.random() * 0.4) + 'px';
    p.style.background = col;
    p.style.borderRadius = (Math.random() > 0.5) ? '50%' : '40% 0 40% 0';
    p.style.left = x + '%';
    p.style.top = y + '%';
    p.style.setProperty('--d', d + 'px');
    p.style.setProperty('--r', r + 'deg');
    p.style.animation = 'floatPetals ' + dur + 's ease-in-out infinite';
    p.style.animationDelay = '-' + (Math.random() * dur) + 's';
    p.style.boxShadow = '0 0 ' + (size * 3) + 'px ' + col;
    c.appendChild(p);
  }
})();
</script>
</body>
</html>
