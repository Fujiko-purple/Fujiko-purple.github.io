<div class="content-page">
  <h1>tar</h1>
  <div class="meta"></div>
  <h2>压缩</h2>

<pre><code class="language-shell">tar -zcvf xxx.tar.gz 目录名
<p>c: create (创建) -&gt; 关键</code></pre></p>



<h2>解压</h2>

<pre><code class="language-shell">tar -zxvf xxx.tar.gz
<p>z: gzip属性</p>
<p>x: extract (解压) -&gt; 关键</p>
<p>v: verbose (显示过程)</p>
<p>f: file (文件名)</code></pre></p>

<h3>指定目录解压</h3>

<pre><code class="language-shell">tar -xvf 解压文件 -C 指定解压到的目录</code></pre>
</div>

<footer class="footer">

<script>
(function(){
  var c = document.getElementById('particles');
  if (!c) return;
  var colors = ['#f9a8d4','#fce7f3','#fbcfe8','#e9d5ff','#fef3c7','#fff'];
  for (var i = 0; i < 15; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var size = 2 + Math.random() * 4;
    var dur = 10 + Math.random() * 10;
    var x = Math.random() * 100;
    var y = 10 + Math.random() * 80;
    var d = 80 + Math.random() * 120;
    var r = (Math.random() - 0.5) * 360;
    var col = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = size + 'px';
    p.style.height = size * (0.6 + Math.random() * 0.4) + 'px';
    p.style.background = col;
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '40% 0 40% 0';
    p.style.left = x + '%';
    p.style.top = y + '%';
    p.style.setProperty('--d', d + 'px');
    p.style.setProperty('--r', r + 'deg');
    p.style.animation = 'floatPetals ' + dur + 's ease-in-out infinite';
    p.style.animationDelay = '-' + (Math.random() * dur) + 's';
    p.style.boxShadow = '0 0 ' + (size * 2) + 'px ' + col;
    c.appendChild(p);
  }
})();
</script>

<script>
(function(){
  var t = document.getElementById('menuToggle');
  var d = document.getElementById('drawer');
  var o = document.getElementById('drawerOverlay');
  var c = document.getElementById('drawerClose');
  if (!t || !d || !o) return;
  function open(){ d.classList.add('open'); o.classList.add('visible'); }
  function cls(){ d.classList.remove('open'); o.classList.remove('visible'); }
  t.addEventListener('click', open);
  o.addEventListener('click', cls);
  if (c) c.addEventListener('click', cls);
})();
</script></body>
