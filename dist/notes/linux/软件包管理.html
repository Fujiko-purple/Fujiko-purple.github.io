  <h1>yum</h1>
  <div class="meta"></div>
  <p>作用：一键安装 卸载软件 软件包搜索 查看软件信息 列出已安装软件</p>

<pre><code class="language-shell">yum -y install 安装的软件
<p>yum remove 卸载的软件</p>
<p>yum update	 #将包进行升级</p>
<p>yum research	查找的包	#可以查找相关的包</p>
<p>yum info 包名	#列出详细信息</p>
<p>yum list	#查看已经安装的包</p>
<p>yum clean all	#清理yum缓存</p>
<p>yum repolist	#列出现在有的仓库所包含的包数量</code></pre></p>

<script>
(function(){
  var c = document.getElementById('particles');
  if (!c) return;
  var colors = ['#f9a8d4','#fce7f3','#fbcfe8','#e9d5ff','#fef3c7','#fff'];
  for (var i = 0; i < 15; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var size = 2 + Math.random() * 4;
    var dur = 10 + Math.random() * 10;
    var x = Math.random() * 100;
    var y = 10 + Math.random() * 80;
    var d = 80 + Math.random() * 120;
    var r = (Math.random() - 0.5) * 360;
    var col = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = size + 'px';
    p.style.height = size * (0.6 + Math.random() * 0.4) + 'px';
    p.style.background = col;
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '40% 0 40% 0';
    p.style.left = x + '%';
    p.style.top = y + '%';
    p.style.setProperty('--d', d + 'px');
    p.style.setProperty('--r', r + 'deg');
    p.style.animation = 'floatPetals ' + dur + 's ease-in-out infinite';
    p.style.animationDelay = '-' + (Math.random() * dur) + 's';
    p.style.boxShadow = '0 0 ' + (size * 2) + 'px ' + col;
    c.appendChild(p);
  }
})();
</script>
