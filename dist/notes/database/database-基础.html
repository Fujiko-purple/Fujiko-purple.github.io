  <h1>数据库基础笔记</h1>
  <div class="meta"></div>
  <h2>什么是数据库</h2>

<p>数据库就是<strong>有组织地存储数据的仓库</strong>，常见的数据库有 MySQL、PostgreSQL、SQLite 等。</p>

<h2>SQL 基础</h2>

<h3>查询数据</h3>

<pre><code class="language-sql">SELECT * FROM users WHERE age &gt; 18;</code></pre>

<h3>插入数据</h3>

<pre><code class="language-sql">INSERT INTO users (name, age) VALUES ('Fujiko', 22);</code></pre>

<h3>更新数据</h3>

<pre><code class="language-sql">UPDATE users SET age = 23 WHERE name = 'Fujiko';</code></pre>

<blockquote>数据库是后端开发的核心技能，一定要打好基础。</blockquote>

<script>
(function(){
  var c = document.getElementById('particles');
  if (!c) return;
  var colors = ['#f9a8d4','#fce7f3','#fbcfe8','#e9d5ff','#fef3c7','#fff'];
  for (var i = 0; i < 15; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var size = 2 + Math.random() * 4;
    var dur = 10 + Math.random() * 10;
    var x = Math.random() * 100;
    var y = 10 + Math.random() * 80;
    var d = 80 + Math.random() * 120;
    var r = (Math.random() - 0.5) * 360;
    var col = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = size + 'px';
    p.style.height = size * (0.6 + Math.random() * 0.4) + 'px';
    p.style.background = col;
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '40% 0 40% 0';
    p.style.left = x + '%';
    p.style.top = y + '%';
    p.style.setProperty('--d', d + 'px');
    p.style.setProperty('--r', r + 'deg');
    p.style.animation = 'floatPetals ' + dur + 's ease-in-out infinite';
    p.style.animationDelay = '-' + (Math.random() * dur) + 's';
    p.style.boxShadow = '0 0 ' + (size * 2) + 'px ' + col;
    c.appendChild(p);
  }
})();
</script>
